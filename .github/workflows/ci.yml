name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: gofmt
        run: test -z "$(gofmt -l .)"
      - name: vet
        run: go vet ./...
      - name: build
        run: go build ./cmd/blitzcrank
      - name: test
        run: go test ./... -race

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      # Builds the package (incl. go test via buildGoModule checkPhase) and
      # the pi-contract check against the pinned Pi runtime.
      - name: flake check
        run: nix flake check -L --no-update-lock-file
